name: 'FP4 — Capture du PWM sur D9 (potentiomètre 0.1 -> e=2.5 -> PWM~126)'
version: 1
author: 'Patxi-Sallaberry'

# Règle le potentiomètre pour viser ~50 % de PWM, laisse la régulation converger,
# le tout capturé par l'analyseur logique du diagramme diagram_vcd.json (-> VCD).
steps:
  - set-control:
      part-id: pot1
      control: position
      value: 0.1
  - delay: 600ms
