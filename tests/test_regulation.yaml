name: 'FP3 — Intégration régulation à T=25 °C (REPOS + REGULATION)'
version: 1
author: 'Patxi-Sallaberry'

# Vérifie la chaîne complète capteur -> consigne -> loi -> état à T procédé = 25 °C.
# On assert surtout l'ÉTAT (robuste), le PWM exact étant couvert par le test unitaire.

steps:
  # Consigne au maximum (pot 1.0 -> 35 °C) : e = -10 -> REPOS, ventilo à l'arrêt.
  - set-control:
      part-id: pot1
      control: position
      value: 1
  - delay: 700ms
  - wait-serial: 'PWM=0 | ETAT=REPOS'

  # Pot 0.375 -> consigne 22.5 °C : e = +2.5 -> on régule (ventilo actif).
  # NB : PAS la butée basse (pot 0 -> 15 °C -> e = +10 >= 8 -> ALARME). On vise
  # le milieu de la bande proportionnelle, à distance des deux frontières d'état.
  - set-control:
      part-id: pot1
      control: position
      value: 0.375
  - delay: 700ms
  - wait-serial: 'ETAT=REGULATION'
